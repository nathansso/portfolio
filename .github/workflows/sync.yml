name: Sync project data

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: pip install anthropic requests python-dotenv

      - name: Sync GitHub metadata
        run: node scripts/sync-projects.js
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}

      - name: Infer skills and summaries
        run: python scripts/infer_skills.py
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Merge auto data into site.js
        run: node scripts/merge-projects.js

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-sync project data [skip ci]'
          file_pattern: 'data/projects-auto.json data/site.js'
