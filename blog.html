<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Blog — Nathaniel Oliver</title>
  <meta name="description" content="Short posts from Nathaniel Oliver on recent achievements, events, and things worth sharing.">
  <link rel="stylesheet" href="styles/tokens.css">
  <style>
    body { background: var(--surface-0); }

    /* ---------- Hero ---------- */
    .bl-hero { padding: var(--sp-6) 0 var(--sp-3); position: relative; overflow: hidden; }
    .bl-hero::before {
      content: '';
      position: absolute; inset: 0; z-index: 0;
      background: linear-gradient(110deg,
        transparent 0%,
        color-mix(in oklab, var(--cat-personal) 16%, transparent) 28%,
        color-mix(in oklab, var(--cat-graduate) 14%, transparent) 52%,
        color-mix(in oklab, var(--accent) 18%, transparent) 78%,
        transparent 100%);
      filter: blur(56px); opacity: 0.7; pointer-events: none;
      mask-image: linear-gradient(180deg, black 0%, black 70%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, black 0%, black 70%, transparent 100%);
    }
    [data-theme="dark"] .bl-hero::before { opacity: 0.55; }
    .bl-hero > .container { position: relative; z-index: 1; }
    .bl-eyebrow {
      font-family: var(--font-mono); font-size: var(--fs-meta);
      text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-muted);
      display: inline-flex; align-items: center; gap: var(--sp-2); margin-bottom: var(--sp-2);
    }
    .bl-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
    .bl-title {
      font-size: clamp(34px, 3.6vw, 48px); font-weight: 600; letter-spacing: -0.03em;
      line-height: 1; color: var(--ink-strong); margin: 0 0 var(--sp-3);
    }
    .bl-sub {
      max-width: 60ch; font-size: clamp(15px, 1vw, 17px); line-height: 1.55;
      color: var(--ink-body); margin: 0;
    }

    /* ---------- Feed ---------- */
    .bl-feed { padding: var(--sp-6) 0 var(--sp-9); }
    .bl-feed-inner {
      max-width: 760px; margin: 0 auto;
      display: flex; flex-direction: column; gap: var(--sp-7);
    }

    .post {
      scroll-margin-top: calc(var(--nav-h) + var(--sp-4));
      background: var(--surface-1);
      border: 1px solid var(--line-faint);
      border-radius: var(--r-4);
      overflow: hidden;
      box-shadow:
        6px 6px 18px color-mix(in oklab, var(--ink-strong) 8%, transparent),
        -4px -4px 14px color-mix(in oklab, var(--surface-2) 92%, white);
    }
    [data-theme="dark"] .post {
      box-shadow: 6px 6px 22px rgba(0,0,0,0.5), -4px -4px 14px color-mix(in oklab, var(--surface-2) 55%, transparent);
    }

    .post-hero { aspect-ratio: 16 / 9; overflow: hidden; background: var(--surface-2); }
    .post-hero img { width: 100%; height: 100%; object-fit: cover; }

    .post-body { padding: var(--sp-6) clamp(var(--sp-5), 4vw, var(--sp-7)); }
    .post-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-3);
      margin-bottom: var(--sp-3);
    }
    .post-date {
      font-family: var(--font-mono); font-size: var(--fs-meta);
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted);
    }
    .post-tags { display: flex; flex-wrap: wrap; gap: var(--sp-2); }
    .post-tag {
      display: inline-flex; align-items: center;
      font-family: var(--font-mono); font-size: var(--fs-meta);
      letter-spacing: 0.04em; color: var(--accent);
    }
    .post-tag::before { content: '#'; opacity: 0.6; }
    .post-title {
      font-size: clamp(22px, 2.4vw, 30px); font-weight: 600; letter-spacing: -0.02em;
      line-height: 1.2; color: var(--ink-strong); margin: 0 0 var(--sp-4);
      text-wrap: balance;
    }
    .post-content { font-size: var(--fs-body); line-height: 1.7; color: var(--ink-body); }
    .post-content p { margin: 0; }
    .post-content p + p { margin-top: var(--sp-4); }
    .post-content strong { color: var(--ink-strong); font-weight: 600; }
    .post-content a { color: var(--accent); border-bottom: 1px solid color-mix(in oklab, var(--accent) 40%, transparent); }
    .post-content a:hover { border-bottom-color: var(--accent); }

    /* Photo gallery */
    .post-gallery {
      margin-top: var(--sp-5);
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: var(--sp-3);
    }
    .post-gallery a {
      display: block; aspect-ratio: 4 / 3; overflow: hidden;
      border-radius: var(--r-3); border: 1px solid var(--line-faint);
    }
    .post-gallery img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 300ms ease;
    }
    .post-gallery a:hover img { transform: scale(1.04); }

    .post-actions { margin-top: var(--sp-5); display: flex; flex-wrap: wrap; gap: var(--sp-2); }

    .post-permalink {
      margin-top: var(--sp-4);
      display: inline-flex; align-items: center; gap: var(--sp-2);
      font-family: var(--font-mono); font-size: var(--fs-meta);
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint);
      transition: color 120ms ease;
    }
    .post-permalink:hover { color: var(--accent); }

    .bl-empty {
      text-align: center; padding: var(--sp-8) var(--sp-5);
      color: var(--ink-muted); font-family: var(--font-mono); font-size: var(--fs-small);
    }
  </style>
</head>
<body>
  <div id="site-nav-host"></div>

  <main>
    <section class="bl-hero">
      <div class="container">
        <div class="bl-eyebrow">Blog</div>
        <h1 class="bl-title">Notes &amp; milestones</h1>
        <p class="bl-sub">Short posts on recent wins, events, and things I'm building — hackathons, launches, and the occasional lesson learned.</p>
      </div>
    </section>

    <section class="bl-feed">
      <div class="container">
        <div class="bl-feed-inner" id="bl-feed"></div>
        <div class="bl-empty" id="bl-empty" hidden>No posts yet — check back soon.</div>
      </div>
    </section>
  </main>

  <div id="site-footer-host"></div>

  <script type="module">
    import { mountChrome } from './scripts/chrome.js?v=1';
    import { POSTS, fmtDate } from './data/site.js?v=6';

    mountChrome('blog');

    const esc = (s) => (s || '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

    // Minimal, safe markdown: escape → **bold** → [text](url) → paragraphs + line breaks
    function formatBody(raw) {
      return (raw || '').split(/\n{2,}/).map(block => {
        let html = esc(block.trim());
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>');
        html = html.replace(/\n/g, '<br>');
        return `<p>${html}</p>`;
      }).join('');
    }

    // Newest first
    const posts = [...POSTS].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    const feed = document.getElementById('bl-feed');
    const empty = document.getElementById('bl-empty');
    empty.hidden = posts.length > 0;

    feed.innerHTML = posts.map(post => {
      const images = post.images || [];
      const header = images[0];
      const rest = images.slice(1);
      const galleryImgs = header ? rest : images; // if a header shows, gallery is the remainder
      return `
        <article class="post" id="${esc(post.id)}">
          ${header ? `<div class="post-hero"><img src="${esc(header)}" alt="" loading="lazy"></div>` : ''}
          <div class="post-body">
            <div class="post-meta">
              <span class="post-date">${fmtDate(post.date)}</span>
              ${(post.tags && post.tags.length) ? `<span class="post-tags">${post.tags.map(t => `<span class="post-tag">${esc(t)}</span>`).join('')}</span>` : ''}
            </div>
            <h2 class="post-title">${esc(post.title)}</h2>
            <div class="post-content">${formatBody(post.body)}</div>
            ${galleryImgs.length ? `
              <div class="post-gallery">
                ${galleryImgs.map(src => `<a href="${esc(src)}" target="_blank" rel="noopener"><img src="${esc(src)}" alt="" loading="lazy"></a>`).join('')}
              </div>` : ''}
            ${post.link ? `
              <div class="post-actions">
                <a class="btn btn-ghost" href="${esc(post.link)}">Read more →</a>
              </div>` : ''}
            <a class="post-permalink" href="#${esc(post.id)}">Permalink</a>
          </div>
        </article>
      `;
    }).join('');

    // Deep-link scroll
    if (location.hash) {
      const el = document.getElementById(location.hash.slice(1));
      if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }
  </script>
</body>
</html>
