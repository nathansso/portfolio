<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Resume — Nathaniel Oliver</title>
  <meta name="description" content="Nathaniel Oliver — Data Scientist. One-page resume.">
  <link rel="stylesheet" href="styles/tokens.css">
  <style>
    body { background: var(--surface-2); }

    /* ---------- Reactive background glow ---------- */
    #bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transition: opacity 600ms ease;
      background: radial-gradient(
        600px circle at var(--mx, 50%) var(--my, 50%),
        color-mix(in oklab, var(--accent) 6%, transparent) 0%,
        transparent 70%
      );
    }
    body.mouse-active #bg-glow { opacity: 1; }
    [data-theme="dark"] #bg-glow {
      background: radial-gradient(
        600px circle at var(--mx, 50%) var(--my, 50%),
        color-mix(in oklab, var(--accent) 9%, transparent) 0%,
        transparent 70%
      );
    }
    @media (prefers-reduced-motion: reduce) { #bg-glow { display: none; } }

    /* ---------- Page chrome ---------- */
    .rs-toolbar {
      position: sticky;
      top: var(--nav-h);
      z-index: 10;
      padding: var(--sp-3) 0;
      background: color-mix(in oklab, var(--surface-2) 92%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line-faint);
    }
    .rs-toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
    }
    .rs-toolbar-label {
      font-family: var(--font-mono);
      font-size: var(--fs-meta);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-muted);
    }
    .rs-toolbar-actions {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
    }

    /* ---------- Document ---------- */
    .rs-page-wrap {
      position: relative;
      z-index: 1;
      padding: var(--sp-5) 0 var(--sp-9);
      display: flex;
      justify-content: center;
    }
    /* Wrapper gives us a positioned parent for link overlays */
    .rs-page {
      position: relative;
      display: inline-block;
      line-height: 0;
      box-shadow:
        0 1px 2px color-mix(in oklab, var(--ink-strong) 8%, transparent),
        0 12px 40px color-mix(in oklab, var(--ink-strong) 12%, transparent);
    }
    #pdf-canvas {
      display: block;
      width: 8.5in;
    }
    [data-theme="dark"] #pdf-canvas {
      filter: invert(0.9) hue-rotate(180deg);
    }
    /* Invisible link overlays */
    .pdf-link {
      position: absolute;
      display: block;
      cursor: pointer;
    }

    /* Footer caption */
    .rs-foot-cap {
      position: relative;
      z-index: 1;
      text-align: center;
      font-family: var(--font-mono);
      font-size: var(--fs-meta);
      color: var(--ink-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: var(--sp-3);
    }

    /* ---------- Print ---------- */
    @page { size: letter; margin: 0; }
    @media print {
      body { background: white !important; }
      #site-nav-host, #site-footer-host, .rs-toolbar, .rs-foot-cap, #bg-glow { display: none !important; }
      .rs-page-wrap { padding: 0; }
      #pdf-canvas { width: 8.5in; }
      .rs-page { box-shadow: none !important; }
    }

    /* Responsive */
    @media (max-width: 760px) {
      #pdf-canvas { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="bg-glow" aria-hidden="true"></div>
  <div id="site-nav-host"></div>

  <main>
    <section class="rs-toolbar">
      <div class="container">
        <div class="rs-toolbar-row">
          <div class="rs-toolbar-label">One-page resume</div>
          <div class="rs-toolbar-actions">
            <a class="btn btn-ghost" href="resume.pdf" target="_blank" rel="noopener">Print</a>
            <a class="btn btn-primary" href="resume.pdf" download="Nathaniel_Oliver_Data_Scientist.pdf">↓ Download PDF</a>
          </div>
        </div>
      </div>
    </section>

    <div class="rs-page-wrap">
      <div class="rs-page">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </div>

    <p class="rs-foot-cap">Open in new tab to print · or use the download button</p>
  </main>

  <div id="site-footer-host"></div>

  <!-- Reactive glow -->
  <script>
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const glow = document.getElementById('bg-glow');
      let rafId;
      document.addEventListener('mousemove', (e) => {
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(() => {
          glow.style.setProperty('--mx', (e.clientX / window.innerWidth  * 100).toFixed(1) + '%');
          glow.style.setProperty('--my', (e.clientY / window.innerHeight * 100).toFixed(1) + '%');
          document.body.classList.add('mouse-active');
        });
      });
    }
  </script>

  <script type="module">
    import { mountChrome } from './scripts/chrome.js?v=1';
    mountChrome('resume');

    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const canvas  = document.getElementById('pdf-canvas');
    const pageEl  = canvas.parentElement;
    const dpr     = window.devicePixelRatio || 1;
    const cssWidth = 8.5 * 96; // 8.5in at 96px/in

    const pdf  = await pdfjsLib.getDocument('resume.pdf').promise;
    const page = await pdf.getPage(1);

    const baseVp  = page.getViewport({ scale: 1 });
    const scale   = (cssWidth * dpr) / baseVp.width;
    const viewport = page.getViewport({ scale });

    canvas.width  = viewport.width;
    canvas.height = viewport.height;
    canvas.style.height = `${viewport.height / dpr}px`;

    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    // Overlay clickable <a> elements for each link annotation
    const annotations = await page.getAnnotations({ intent: 'display' });
    for (const ann of annotations) {
      if (ann.subtype !== 'Link' || !ann.url) continue;

      const vr = viewport.convertToViewportRectangle(ann.rect);
      const left   = Math.min(vr[0], vr[2]) / dpr;
      const top    = Math.min(vr[1], vr[3]) / dpr;
      const width  = Math.abs(vr[2] - vr[0]) / dpr;
      const height = Math.abs(vr[3] - vr[1]) / dpr;

      const a = document.createElement('a');
      a.className = 'pdf-link';
      a.href = ann.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.left   = `${left}px`;
      a.style.top    = `${top}px`;
      a.style.width  = `${width}px`;
      a.style.height = `${height}px`;
      pageEl.appendChild(a);
    }
  </script>
</body>
</html>
